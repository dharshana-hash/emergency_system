{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card shadow p-4 border-0">
            <h3 class="fw-bold text-dark text-center mb-4">Identity Verification</h3>
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label fw-bold">System Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password Passkey</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow">INITIATE SESSION</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
