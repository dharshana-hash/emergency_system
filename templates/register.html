{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card shadow p-4 border-0">
            <h3 class="fw-bold text-dark text-center mb-4">Provision New User Account</h3>
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label fw-bold">System Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Security Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Operational System Authorization Role</label>
                    <select name="role" class="form-select" required>
                        <option value="Admin">Admin (Crisis Commander)</option>
                        <option value="Volunteer" selected>Volunteer (Field Responder)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow">REGISTER SYSTEM ACCOUNT</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
